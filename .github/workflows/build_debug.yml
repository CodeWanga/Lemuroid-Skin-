name: Build Debug APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :lemuroid-app:assembleFreeDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v3
        with:
          name: Lemuroid-Skin-Debug
          path: lemuroid-app/build/outputs/apk/free/debug/lemuroid-app-free-debug.apk
